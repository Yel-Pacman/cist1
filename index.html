<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="description" content="Canadian International School Tangier - Providing world-class education in Tangier, Morocco with Canadian curriculum and international standards">
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<body>
    <div id="root"></div>
    
    <!-- Hidden form for Netlify detection -->
    <form name="pre-registration" netlify netlify-honeypot="bot-field" hidden>
        <input type="text" name="studentName" />
        <input type="date" name="dateOfBirth" />
        <input type="text" name="gender" />
        <input type="text" name="gradeApplying" />
        <input type="text" name="parentName" />
        <input type="tel" name="phone" />
        <input type="tel" name="whatsapp" />
        <input type="email" name="email" />
        <input type="checkbox" name="agreement" />
    </form>
    
    <script type="module" src="/src/main.jsx"></script>
